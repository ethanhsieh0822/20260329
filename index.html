<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>筷炒 | KUAI CHAO LOTTERY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary-color: #1f244d; /* 筷炒深藍 */
      --secondary-color: #dfdacb; /* 品牌米色 */
      --accent-red: #e63946;    /* 警告與中獎紅 */
      --overlay: rgba(31, 36, 77, 0.9);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--primary-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px 0;
    }

    /* 美術館展位卡片 */
    .museum-card {
      background: var(--secondary-color);
      width: 330px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 50px 100px rgba(0,0,0,0.6);
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      padding: 40px 25px;
    }

    .logo-container { margin-bottom: 20px; }
    .logo-img { width: 130px; height: auto; display: block; margin: 0 auto; mix-blend-mode: multiply; }

    .slogan { 
      font-size: 15px; 
      font-weight: 800; 
      line-height: 1.6; 
      letter-spacing: 1.5px; 
      color: var(--primary-color); 
      margin-bottom: 25px; 
    }

    /* 抽獎按鈕 */
    #drawBtn {
      width: 100%;
      padding: 18px 0;
      background-color: var(--primary-color);
      color: var(--secondary-color);
      border: none;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #drawBtn:disabled { background-color: rgba(31, 36, 77, 0.2); color: rgba(31, 36, 77, 0.4); }

    /* 閃爍免責聲明動畫 */
    @keyframes breath {
      0% { opacity: 0.3; }
      50% { opacity: 1; color: var(--accent-red); }
      100% { opacity: 0.3; }
    }

    .legal-notice {
      margin-top: 15px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--primary-color);
      animation: breath 2.5s infinite ease-in-out;
    }

    /* 結果區塊 */
    .result-container {
      margin-top: 15px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .dot-loader { display: none; gap: 6px; }
    .dot { width: 8px; height: 8px; background: var(--primary-color); border-radius: 50%; animation: dotPulse 0.6s infinite alternate; }
    @keyframes dotPulse { from { transform: scale(0.6); opacity: 0.2; } to { transform: scale(1.1); opacity: 1; } }

    .win-title { color: var(--accent-red); font-size: 28px; font-weight: 900; letter-spacing: 4px; animation: textBlink 0.5s step-end infinite; margin-bottom: 12px; }
    @keyframes textBlink { 50% { opacity: 0; } }

    .lose-title { color: #555; font-size: 24px; font-weight: 900; letter-spacing: 2px; margin-bottom: 12px; }

    .prize-photo { width: 100%; height: 170px; background-size: cover; background-position: center; border: 2px solid var(--primary-color); margin-bottom: 12px; box-shadow: 6px 6px 0 rgba(31,36,77,0.1); }
    .prize-name { font-size: 16px; font-weight: 700; border-bottom: 2px solid var(--primary-color); padding-bottom: 4px; color: var(--primary-color); }
    .lose-text { font-size: 15px; color: #777; font-weight: 400; line-height: 1.8; }

    /* 社群連結按鈕 */
    .social-footer { width: 100%; margin-top: 25px; display: flex; gap: 8px; }
    .social-btn {
      flex: 1; padding: 10px 0; background-color: transparent; color: var(--primary-color);
      text-decoration: none; font-size: 10px; font-weight: 800; border: 1.5px solid var(--primary-color); transition: 0.2s; text-align: center;
    }
    .social-btn:hover { background-color: var(--primary-color); color: var(--secondary-color); }

    /* 確認彈窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--overlay);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: var(--secondary-color);
      width: 280px;
      padding: 30px;
      text-align: center;
      border: 1px solid white;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .modal-content h3 { font-size: 18px; margin-bottom: 15px; color: var(--primary-color); }
    .modal-content p { font-size: 13px; line-height: 1.6; color: var(--primary-color); margin-bottom: 25px; opacity: 0.8; }

    .confirm-btn {
      width: 100%;
      padding: 12px 0;
      background: var(--primary-color);
      color: var(--secondary-color);
      border: none;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    .cancel-btn {
      font-size: 11px;
      color: var(--primary-color);
      text-decoration: underline;
      cursor: pointer;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="museum-card">
  <div class="logo-container">
    <img src="https://i.postimg.cc/FRT3kRhW/kuai-chao-KUAI-CHAO-RGB-heng-shi.jpg" class="logo-img" alt="筷炒 Logo">
  </div>

  <div class="slogan" id="sloganText">
    試試你的好手氣！<br>
    雙倍份量蒜蓉蒸蝦等你拿！
  </div>

  <button id="drawBtn">START</button>

  <div class="legal-notice" id="legalNotice">
    每人每桌僅可參加一次<br>
    如有任何問題筷炒擁有最終解釋之權力
  </div>

  <div class="result-container" id="resultWrap">
    <div class="dot-loader" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div id="displayContent"></div>
  </div>

  <div class="social-footer">
    <a href="https://www.facebook.com/KUAICHAO.TAIPEI/photos" target="_blank" class="social-btn">FB / FACEBOOK</a>
    <a href="https://www.instagram.com/kuaichao.taipei/" target="_blank" class="social-btn">IG / INSTAGRAM</a>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-content">
    <h3>確認參與抽獎</h3>
    <p>我了解每人每桌僅限參加一次，並願意接受抽獎結果。若中獎將於本次消費時兌換使用。</p>
    <button class="confirm-btn" id="finalGo">我同意並開始抽獎</button>
    <div class="cancel-btn" id="cancelGo">返回</div>
  </div>
</div>

<script>
  const btn = document.getElementById('drawBtn');
  const modal = document.getElementById('confirmModal');
  const finalGo = document.getElementById('finalGo');
  const cancelGo = document.getElementById('cancelGo');
  const loader = document.getElementById('loader');
  const display = document.getElementById('displayContent');
  const slogan = document.getElementById('sloganText');
  const legal = document.getElementById('legalNotice');

  // 本地儲存金鑰（若要重新測試，可更換此名稱）
  const STORAGE_KEY = 'kc_final_v5';

  const pastResult = localStorage.getItem(STORAGE_KEY);
  if (pastResult) {
    lockUI(pastResult);
  }

  btn.addEventListener('click', () => {
    modal.style.display = 'flex';
  });

  cancelGo.addEventListener('click', () => {
    modal.style.display = 'none';
  });

  finalGo.addEventListener('click', () => {
    modal.style.display = 'none';
    startLottery();
  });

  function startLottery() {
    btn.disabled = true;
    btn.textContent = "PROCESSING...";
    slogan.style.display = "none";
    legal.style.display = "none";
    display.innerHTML = "";
    loader.style.display = "flex";

    // 20% 中獎機率
    const isWin = Math.random() < 0.2; 
    const result = isWin ? "WIN" : "LOSE";

    setTimeout(() => {
      loader.style.display = "none";
      localStorage.setItem(STORAGE_KEY, result);
      renderFinal(result);
      btn.textContent = "FINISHED";
    }, 1500);
  }

  function lockUI(res) {
    slogan.style.display = "none";
    legal.style.display = "none";
    renderFinal(res);
    btn.disabled = true;
    btn.textContent = "FINISHED";
  }

  function renderFinal(res) {
    if (res === "WIN") {
      display.innerHTML = `
        <div class="win-title">中獎 / WIN</div>
        <div class="prize-photo" style="background-image: url('https://i.postimg.cc/rw54Cg8S/suan-rong-zheng-xia.jpg')"></div>
        <div class="prize-name">雙倍份量的蒜蓉蒸蝦</div>
      `;
    } else {
      display.innerHTML = `
        <div class="lose-title">未中獎</div>
        <div class="lose-text">感謝您的參與<br>祝您用餐愉快</div>
      `;
    }
  }
</script>

</body>
</html>
