<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>筷炒 | KUAI CHAO LOTTERY</title>
  <style>
    /* 美術館指定色系 */
    :root {
      --primary: #1f244d;   /* 深藍 */
      --secondary: #dfdacb; /* 米白 */
      --accent: #e63946;    /* 紅色 */
      --overlay: rgba(31, 36, 77, 0.96);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      background-color: var(--primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: var(--primary);
    }

    /* 集中式美術館外框：改為彈性高度，確保大文字不溢出 */
    .museum-frame {
      width: 92%;
      max-width: 350px;
      height: auto;
      max-height: 92dvh;
      background-color: var(--secondary);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-radius: 4px;
    }

    /* 頂部標題 */
    .header {
      text-align: center;
      margin-bottom: 12px;
      flex-shrink: 0; /* 絕不縮小 */
    }
    .logo-img { width: 105px; height: auto; mix-blend-mode: multiply; margin-bottom: 6px; }
    .slogan { font-size: 13px; font-weight: 800; letter-spacing: 1px; margin: 0; white-space: nowrap; }

    /* 中央主舞台：負責彈性調配空間 */
    .main-stage {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 0; /* Flex 壓縮核心設定 */
      margin: 10px 0;
    }

    .scene { display: none; width: 100%; flex-direction: column; align-items: center; text-align: center; }
    .active { display: flex; }

    /* 入口圖片：允許隨螢幕高度縮小 */
    .promo-img {
      width: auto;
      max-width: 80%;
      height: auto;
      max-height: 20vh; /* 限制在視窗高度的20%，防擠壓 */
      object-fit: contain;
      border-radius: 4px; 
      border: 2px solid var(--primary); 
      box-shadow: 4px 4px 0 rgba(31,36,77,0.1); 
      margin-bottom: 20px;
    }

    /* 按鈕基底：加入防爆字設定 */
    .action-btn {
      width: 100%; 
      padding: 14px 10px; 
      background-color: var(--primary); 
      color: var(--secondary); 
      border: none; 
      font-size: 16px; 
      font-weight: 900; 
      letter-spacing: 2px; 
      cursor: pointer; 
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap; /* 強制不換行 */
      text-overflow: ellipsis;
      overflow: hidden;
      border-radius: 2px;
    }
    .action-btn:active { transform: scale(0.99); }

    /* 轉盤設計：允許隨螢幕高度自動等比例縮小 */
    .wheel-box {
      width: 45vw;
      height: 45vw;
      max-width: 220px;
      max-height: 220px;
      min-width: 160px;
      min-height: 160px;
      position: relative; 
      margin-bottom: 15px;
      flex-shrink: 1; /* 螢幕小時允許縮小 */
    }
    .wheel-main {
      width: 100%; height: 100%; border-radius: 50%;
      border: 5px solid var(--primary); box-sizing: border-box;
      background: conic-gradient(
        var(--primary) 0deg 60deg, var(--secondary) 60deg 120deg, 
        var(--primary) 120deg 180deg, var(--secondary) 180deg 240deg, 
        var(--primary) 240deg 300deg, var(--secondary) 300deg 360deg
      );
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
    }
    .pointer {
      position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; 
      border-left: 15px solid transparent; border-right: 15px solid transparent;
      border-top: 30px solid var(--accent); z-index: 10;
    }
    .wheel-center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 22px; height: 22px; background: var(--accent); border-radius: 50%; 
      border: 3px solid var(--secondary);
    }

    /* 結果文字 */
    @keyframes textBlink { 50% { opacity: 0; } }
    .res-title { color: var(--accent); font-size: 32px; font-weight: 900; letter-spacing: 2px; margin: 0 0 12px 0; white-space: nowrap; }
    .res-sub { font-size: 20px; font-weight: 900; line-height: 1.5; border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary); padding: 15px 5px; margin: 0; width: 100%; }

    /* 底部社群 */
    .footer { flex-shrink: 0; margin-top: 15px; display: flex; gap: 8px; width: 100%; }
    .social-btn { flex: 1; padding: 10px 0; background: transparent; color: var(--primary); text-decoration: none; font-size: 11px; font-weight: 800; border: 1.5px solid var(--primary); text-align: center; }

    /* 條款彈窗背景 */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--overlay); z-index: 999;
      justify-content: center; align-items: center; padding: 15px;
    }
    /* 彈窗主體：寬度與內距優化 */
    .modal-inner {
      background: var(--secondary); 
      width: 100%;
      max-width: 300px; 
      padding: 20px;
      text-align: center; 
      border: 1px solid white; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border-radius: 4px;
    }
    .modal-inner h3 { margin-top: 0; font-size: 16px; margin-bottom: 10px; color: var(--primary); font-weight: 900; }
    .modal-text { font-size: 13.5px; line-height: 1.5; text-align: justify; margin-bottom: 18px; font-weight: 600; color: var(--primary); }
    
    /* 修正後的確認按鈕：防爆字防跑位 */
    .confirm-btn { 
      width: 100%; 
      padding: 14px 5px; 
      background: #bbbbbb; 
      color: #ffffff; 
      border: none; 
      font-size: 15px; 
      font-weight: 900; 
      letter-spacing: 1.5px; 
      cursor: not-allowed; 
      transition: 0.2s;
      white-space: nowrap; /* 核心修正：文字絕對不允許折行跑位 */
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 2px;
    }
    .confirm-btn.active { background: var(--primary); color: var(--secondary); cursor: pointer; }
  </style>
</head>
<body>

<div class="museum-frame">
  <div class="header">
    <img src="https://i.postimg.cc/FRT3kRhW/kuai-chao-KUAI-CHAO-RGB-heng-shi.jpg" class="logo-img" alt="Logo">
    <div class="slogan">最高 3 倍蛤蠣等你拿！</div>
  </div>

  <div class="main-stage">
    
    <div class="scene active" id="entry">
      <img src="https://i.postimg.cc/G2QH57fh/5bi4.png" class="promo-img" alt="Promo">
      <button class="action-btn" onclick="openModal()">立即啟動</button>
      <div style="margin-top: 12px; font-size: 11px; font-weight: 700; opacity: 0.7; white-space: nowrap;">每人每桌僅可參加一次 | 筷炒擁有最終解釋權</div>
    </div>

    <div class="scene" id="wheel">
      <div class="wheel-box">
        <div class="pointer"></div>
        <div class="wheel-main" id="wheelBody"></div>
        <div class="wheel-center"></div>
      </div>
      <div style="font-weight: 900; letter-spacing: 3px; font-size: 11px;">LUCK SEARCHING...</div>
    </div>

    <div class="scene" id="result">
      <div id="resultOutput" style="width: 100%;"></div>
    </div>

  </div>

  <div class="footer">
    <a href="https://www.facebook.com/KUAICHAO.TAIPEI/photos" target="_blank" class="social-btn">FB</a>
    <a href="https://www.instagram.com/kuaichao.taibei/" target="_blank" class="social-btn">IG</a>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-inner">
    <h3>【活動約定】</h3>
    <div class="modal-text">
      按下同意即代表每桌參與乙次，並接受結果。餐點已同步進入製作流程，結果產生後，原訂單內容恕不接受退換。 優惠將於本次消費即時抵用。
    </div>
    <button class="confirm-btn" id="confirmBtn" disabled onclick="startDraw()">請稍候 (3s)</button>
  </div>
</div>

<script>
  // 單次鎖定 Key
  const STORAGE_KEY = 'kuaichao_lotto_strict_v24';
  
  // 精確獎項對應
  const PRIZE_MAP = {
    "3X":     { title: "中獎 / WIN", desc: "塔香炒蛤蠣<br>3 倍份量！" },
    "2X":     { title: "中獎 / WIN", desc: "塔香炒蛤蠣<br>雙倍份量！" },
    "150OFF": { title: "中獎 / WIN", desc: "塔香炒蛤蠣<br>現折 150 元！" },
    "100OFF": { title: "中獎 / WIN", desc: "塔香炒蛤蠣<br>現折 100 元！" },
    "50OFF":  { title: "中獎 / WIN", desc: "塔香炒蛤蠣<br>現折 50 元！" },
    "30OFF":  { title: "中獎 / WIN", desc: "塔香炒蛤蠣<br>現折 30 元！" }
  };

  window.onload = () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) {
      showScene('result');
      renderResult(saved);
    }
  };

  function openModal() {
    document.getElementById('modal').style.display = 'flex';
    let sec = 3;
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.classList.remove('active');
    btn.textContent = `請稍候 (${sec}s)`;
    
    const timer = setInterval(() => {
      sec--;
      if(sec > 0) {
        btn.textContent = `請稍候 (${sec}s)`;
      } else {
        clearInterval(timer);
        btn.disabled = false;
        btn.classList.add('active');
        btn.textContent = "確定並開始";
      }
    }, 1000);
  }

  function startDraw() {
    document.getElementById('modal').style.display = 'none';
    showScene('wheel');
    
    // 精確機率配比
    const rand = Math.random() * 10000; 
    let res = "30OFF";
    
    if (rand < 5) res = "3X";             // 0.05%
    else if (rand < 505) res = "2X";      // 5%
    else if (rand < 1505) res = "150OFF"; // 10%
    else if (rand < 3005) res = "100OFF"; // 15%
    else if (rand < 6505) res = "50OFF";  // 35%
    else res = "30OFF";                   // 34.95%

    const rotate = 7200 + Math.floor(Math.random() * 360);
    setTimeout(() => {
      document.getElementById('wheelBody').style.transform = `rotate(${rotate}deg)`;
    }, 50);

    setTimeout(() => {
      localStorage.setItem(STORAGE_KEY, res); 
      renderResult(res);
      showScene('result');
    }, 4200);
  }

  function showScene(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function renderResult(key) {
    const out = document.getElementById('resultOutput');
    const prize = PRIZE_MAP[key] || PRIZE_MAP["30OFF"];
    out.innerHTML = `
      <div class="res-title" style="animation: textBlink 0.6s step-end infinite;">${prize.title}</div>
      <div class="res-sub">${prize.desc}</div>
    `;
  }
</script>

</body>
</html>
