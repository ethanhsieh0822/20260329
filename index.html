<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>筷炒 | KUAI CHAO LOTTERY</title>
  <style>
    :root {
      --primary-color: #1f244d; 
      --secondary-color: #dfdacb; 
      --accent-red: #e63946;    
      --overlay: rgba(31, 36, 77, 0.95);
    }

    body {
      margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
      background-color: var(--primary-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden; color: var(--primary-color);
    }

    .museum-card {
      background: var(--secondary-color); width: 90%; max-width: 340px; height: 85vh; max-height: 550px;
      text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.6); position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 25px; box-sizing: border-box;
    }

    .card-header { flex: 0 0 auto; margin-bottom: 10px; }
    .logo-img { width: 110px; height: auto; display: block; margin: 0 auto 10px auto; mix-blend-mode: multiply; }
    .slogan { font-size: 14px; font-weight: 800; line-height: 1.6; letter-spacing: 1px; color: var(--primary-color); margin: 0; }

    .scene-container { flex: 1 1 auto; display: none; flex-direction: column; justify-content: center; align-items: center; width: 100%; position: relative; }
    .scene-active { display: flex; }

    .promo-img { max-width: 85%; height: auto; border-radius: 6px; border: 2px solid var(--primary-color); box-shadow: 4px 4px 0 rgba(31,36,77,0.1); margin-bottom: 25px; }
    #drawBtn { width: 100%; padding: 18px 0; background-color: var(--primary-color); color: var(--secondary-color); border: none; font-size: 16px; font-weight: 900; letter-spacing: 5px; cursor: pointer; }

    @keyframes breath { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; color: var(--accent-red); } }
    .legal-notice { margin-top: 15px; font-size: 11px; font-weight: 700; color: var(--primary-color); animation: breath 2.5s infinite ease-in-out; }

    .wheel-stage { width: 230px; height: 230px; position: relative; }
    .wheel-canvas {
      width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--primary-color); box-sizing: border-box;
      background: conic-gradient(var(--primary-color) 0deg 45deg, var(--secondary-color) 45deg 90deg, var(--primary-color) 90deg 135deg, var(--secondary-color) 135deg 180deg, var(--primary-color) 180deg 225deg, var(--secondary-color) 225deg 270deg, var(--primary-color) 270deg 315deg, var(--secondary-color) 315deg 360deg);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3); transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
    }
    .wheel-pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 35px solid var(--accent-red); z-index: 10; }
    .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 26px; height: 26px; background: var(--accent-red); border-radius: 50%; border: 4px solid var(--secondary-color); }

    @keyframes textBlink { 50% { opacity: 0; } }
    .win-title { color: var(--accent-red); font-size: 42px; font-weight: 900; letter-spacing: 4px; animation: textBlink 0.6s step-end infinite; margin-bottom: 25px; line-height: 1.2; }
    .prize-name { font-size: 24px; font-weight: 900; color: var(--primary-color); line-height: 1.6; border-top: 3px solid var(--primary-color); border-bottom: 3px solid var(--primary-color); padding: 20px 0; margin: 0 10px; }
    .lose-title { color: #555; font-size: 38px; font-weight: 900; margin-bottom: 20px; }
    .lose-text { font-size: 18px; color: #777; font-weight: 700; line-height: 1.8; }

    .social-footer { flex: 0 0 auto; margin-top: 20px; display: flex; gap: 8px; }
    .social-btn { flex: 1; padding: 12px 0; background-color: transparent; color: var(--primary-color); text-decoration: none; font-size: 11px; font-weight: 800; border: 1.5px solid var(--primary-color); text-align: center; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: var(--secondary-color); width: 85%; max-width: 300px; padding: 25px; text-align: center; border: 1px solid white; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .modal-content h3 { margin-top: 0; color: var(--primary-color); font-size: 18px; margin-bottom: 12px; }
    .modal-content p { font-size: 14px; line-height: 1.6; color: var(--primary-color); text-align: justify; margin-bottom: 15px; font-weight: 600; }
    
    .agree-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; cursor: pointer; text-align: left; justify-content: center; }
    .agree-wrap input { width: 18px; height: 18px; flex-shrink: 0; }
    .agree-wrap span { font-size: 14px; font-weight: 800; color: var(--primary-color); }

    .confirm-btn { width: 100%; padding: 15px 0; background: #ccc; color: #fff; border: none; font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; cursor: not-allowed; transition: 0.3s; }
    .confirm-btn.active { background: var(--primary-color); color: var(--secondary-color); cursor: pointer; }
    
    .cancel-btn { font-size: 12px; color: var(--primary-color); text-decoration: underline; opacity: 0.6; cursor: pointer; }
  </style>
</head>
<body>

<div class="museum-card">
  <div class="card-header">
    <img src="https://i.postimg.cc/FRT3kRhW/kuai-chao-KUAI-CHAO-RGB-heng-shi.jpg" class="logo-img" alt="Logo">
    <div class="slogan">最高 3 倍蛤蠣等你拿！</div>
  </div>

  <div class="scene-container scene-active" id="sceneEntry">
    <img src="https://i.postimg.cc/G2QH57fh/5bi4.png" class="promo-img" alt="示意圖">
    <button id="drawBtn">立即啟動</button>
    <div class="legal-notice">每人每桌僅可參加一次<br>如有問題筷炒擁有最終解釋權</div>
  </div>

  <div class="scene-container" id="sceneWheel">
    <div class="wheel-stage">
      <div class="wheel-pointer"></div>
      <div class="wheel-canvas" id="wheelBody"></div>
      <div class="wheel-center"></div>
    </div>
    <div style="margin-top: 30px; font-weight: 900; letter-spacing: 4px; color: var(--primary-color); font-size: 12px;">LUCK SEARCHING...</div>
  </div>

  <div class="scene-container" id="sceneResult">
    <div class="result-content" id="displayContent"></div>
  </div>

  <div class="social-footer">
    <a href="https://www.facebook.com/KUAICHAO.TAIPEI/photos" target="_blank" class="social-btn">FB</a>
    <a href="https://www.instagram.com/kuaichao.taipei/" target="_blank" class="social-btn">IG</a>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-content">
    <h3>【活動約定】</h3>
    <p>按下同意即代表每桌參與乙次，並接受結果。餐點已同步進入製作流程，結果產生後，原訂單內容恕不接受退換。 優惠將於本次消費即時抵用。</p>
    
    <label class="agree-wrap">
      <input type="checkbox" id="agreeCheck">
      <span>我同意以上條款</span>
    </label>

    <button class="confirm-btn" id="finalGo" disabled>請稍候 (3s)</button>
    <div class="cancel-btn" id="cancelGo">返回</div>
  </div>
</div>

<script>
  const wheelBody = document.getElementById('wheelBody');
  const display = document.getElementById('displayContent');
  const sceneEntry = document.getElementById('sceneEntry');
  const sceneWheel = document.getElementById('sceneWheel');
  const sceneResult = document.getElementById('sceneResult');
  const confirmBtn = document.getElementById('finalGo');
  const agreeCheck = document.getElementById('agreeCheck');

  // 更新 STORAGE_KEY 確保最新版本生效
  const STORAGE_KEY = 'kuaichao_lotto_final_v17';

  if (localStorage.getItem(STORAGE_KEY)) { switchScene('result'); renderFinal(localStorage.getItem(STORAGE_KEY)); }

  document.getElementById('drawBtn').addEventListener('click', () => { 
    document.getElementById('confirmModal').style.display = 'flex'; 
    startCountdown();
  });

  document.getElementById('cancelGo').addEventListener('click', () => { 
    document.getElementById('confirmModal').style.display = 'none'; 
    resetModal();
  });

  let canClick = false;
  function updateBtnState() {
    if (agreeCheck.checked && canClick) {
      confirmBtn.disabled = false;
      confirmBtn.classList.add('active');
      confirmBtn.textContent = "確定並開始";
    } else {
      confirmBtn.disabled = true;
      confirmBtn.classList.remove('active');
    }
  }

  agreeCheck.addEventListener('change', updateBtnState);

  function startCountdown() {
    let sec = 3;
    canClick = false;
    confirmBtn.textContent = `請稍候 (${sec}s)`;
    const timer = setInterval(() => {
      sec--;
      if (sec > 0) {
        confirmBtn.textContent = `請稍候 (${sec}s)`;
      } else {
        clearInterval(timer);
        canClick = true;
        updateBtnState();
        if (!agreeCheck.checked) confirmBtn.textContent = "請勾選同意";
      }
    }, 1000);
  }

  function resetModal() {
    agreeCheck.checked = false;
    confirmBtn.disabled = true;
    confirmBtn.classList.remove('active');
  }

  confirmBtn.addEventListener('click', () => {
    document.getElementById('confirmModal').style.display = 'none';
    switchScene('wheel');
    startWheelAnimation();
  });

  function switchScene(target) {
    [sceneEntry, sceneWheel, sceneResult].forEach(s => s.classList.remove('scene-active'));
    if (target === 'entry') sceneEntry.classList.add('scene-active');
    if (target === 'wheel') sceneWheel.classList.add('scene-active');
    if (target === 'result') sceneResult.classList.add('scene-active');
  }

  function startWheelAnimation() {
    const rand = Math.random() * 100;
    // 機率：5% 3倍, 30% 2倍, 40% 50元, 25% 原價
    let result = (rand < 5) ? "TRIPLE" : (rand < 35) ? "DOUBLE" : (rand < 75) ? "DISCOUNT" : "ORIGINAL";
    const totalRotation = 7200 + Math.floor(Math.random() * 360); 
    setTimeout(() => { wheelBody.style.transform = `rotate(${totalRotation}deg)`; }, 100);
    setTimeout(() => {
      localStorage.setItem(STORAGE_KEY, result);
      renderFinal(result);
      switchScene('result');
    }, 4200); 
  }

  function renderFinal(res) {
    let title = "", name = "", isWin = true;
    switch(res) {
      case "TRIPLE": title = "中獎 / WIN"; name = "塔香炒蛤蠣<br>3 倍份量！"; break;
      case "DOUBLE": title = "中獎 / WIN"; name = "塔香炒蛤蠣<br>雙倍份量！"; break;
      case "DISCOUNT": title = "中獎 / WIN"; name = "塔香炒蛤蠣<br>現折 50 元！"; break;
      case "ORIGINAL": title = "未中獎"; name = "原價計費"; isWin = false; break;
    }
    if (isWin) {
      display.innerHTML = `<div class="win-title">${title}</div><div class="prize-name">${name}</div>`;
    } else {
      display.innerHTML = `<div class="lose-title">${title}</div><div class="lose-text">感謝您的參與<br>預祝用餐愉快</div>`;
    }
  }
</script>

</body>
</html>
